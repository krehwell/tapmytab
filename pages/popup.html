<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>tapmytab</title>
        <style>
            :root {
                color-scheme: dark;
            }
            * {
                margin: 0;
                box-sizing: border-box;
            }
            body {
                width: 360px;
                background: #252b31;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                color: #e8eaed;
                padding-bottom: 16px;
            }
            img.splash {
                display: block;
                width: 100%;
                pointer-events: none;
                user-select: none;
                -webkit-user-drag: none;
            }
            .body {
                margin-top: -6px;
                text-align: center;
            }
            p.hint {
                font-size: 12.5px;
                color: #9aa4b2;
                margin-bottom: 8px;
                pointer-events: none;
                user-select: none;
            }
            a.gh {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                text-decoration: none;
                color: #e8eaed;
                background: #1c2026;
                border: 1px solid #333b45;
                padding: 9px 16px;
                border-radius: 10px;
                font-size: 14px;
                font-weight: 600;
                transition: background 0.15s ease;
            }
            a.gh:hover {
                background: #262c34;
            }
            a.gh svg {
                flex-shrink: 0;
            }
        </style>
    </head>
    <body>
        <!-- assets live in public/ (served at the extension root), so reference them absolutely -->
        <img class="splash" src="/tapmytab_splash.webp" alt="Welcome to tapmytab" draggable="false" />
        <div class="body">
            <p class="hint">Open a new tab to start</p>
            <a class="gh" href="https://github.com/krehwell/tapmytab" rel="noopener noreferrer">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z" />
                </svg>
                Star us on GitHub
            </a>
        </div>
        <script type="module" src="./popup.js"></script>
    </body>
</html>
